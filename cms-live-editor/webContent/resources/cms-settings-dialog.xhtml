<ui:composition xmlns="http://www.w3.org/1999/xhtml"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui">

  <p:dialog id="cms-settings-dialog"
    header="#{ivy.cms.co('/Labels/Settings')}"
    widgetVar="cmsSettingsDialog" modal="true" closable="true"
    onHide="PF('hidden-exit-btn').jq.click();" resizable="false"
    styleClass="border-round-xl w-25rem cms-settings-dialog">
    <div class="section-header font-semibold">#{ivy.cms.co('/Labels/Path')}</div>
    <div class="path-section">
      <h:outputLabel for="switch-view-path-btn"
        value="#{ivy.cms.co('/Labels/ShowFullPath')}" />
      <p:toggleSwitch id="switch-view-path-btn"
        value="#{cmsLiveEditorBean.fullPathVisible}"
        styleClass="switch-view-path-btn ml-2">
        <p:ajax listener="#{cmsLiveEditorBean.savePathViewStatus()}" />
      </p:toggleSwitch>
    </div>
    <div class="section-header font-semibold">#{ivy.cms.co('/Labels/Translations')}</div>
    <div class="input-section-delimeter">
      <h:outputLabel for="leadingLocale"
        styleClass="block text-sm mb-2 text-color-secondary"
        value="#{ivy.cms.co('/Labels/SourceLanguage')}" />
      <p:selectOneMenu id="leadingLocale"
        value="#{cmsLiveEditorBean.selectedSourceLocale}"
        styleClass="w-full" filter="true" filterMatchMode="contains">
        <f:selectItems value="#{cmsLiveEditorBean.languageList}"
          var="loc" itemLabel="#{loc.displayLanguage}"
          itemValue="#{loc.toLanguageTag()}" />
        <p:ajax event="change" process="@this" update="targetLocale" />
      </p:selectOneMenu>
    </div>
    <div>
      <h:outputLabel for="targetLocale"
        styleClass="block text-sm mb-2 text-color-secondary"
        value="#{ivy.cms.co('/Labels/TargetLanguage')}" />
      <p:selectOneMenu id="targetLocale"
        value="#{cmsLiveEditorBean.selectedTargetLocale}"
        styleClass="w-full" filter="true" filterMatchMode="contains">
        <f:selectItems value="#{cmsLiveEditorBean.targetLocales}"
          var="loc" itemLabel="#{loc.displayLanguage}"
          itemValue="#{loc.toLanguageTag()}" />
        <p:ajax event="change" process="@this" update="@none" />
      </p:selectOneMenu>
    </div>
    <f:facet name="footer">
      <div class="flex justify-content-center">
        <p:commandButton value="#{ivy.cms.co('/Labels/Save')}"
          id="cms-setting-save-btn"
          styleClass="w-full border-round-lg cms-setting-save-btn"
          actionListener="#{cmsLiveEditorBean.saveTranslationSettings()}"
          process="@form" update="content-form"
          oncomplete="PF('cmsSettingsDialog').hide();" />
        <p:commandButton widgetVar="hidden-exit-btn" styleClass="hidden"
          actionListener="#{cmsLiveEditorBean.onHideSettingDialog()}" />
      </div>
    </f:facet>
  </p:dialog>
</ui:composition>
