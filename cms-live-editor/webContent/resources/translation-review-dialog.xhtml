<ui:composition xmlns="http://www.w3.org/1999/xhtml"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui">
  <p:dialog header="Translation Review" widgetVar="translationReviewDlg"
    modal="true" width="800" id="translationReviewDialog">
    <h:outputText value="Review the changes before applying them." />
    <p:dataTable value="#{cmsLiveEditorBean.translationResults}"
      var="cms">
      <p:column headerText="Path">
        <h:outputText value="#{cms.uri}" />
      </p:column>
      <p:column
        headerText="#{cmsLiveEditorBean.selectedSourceLanguage.displayLanguage}">
        <h:outputText
          value="#{cmsLiveEditorBean.getValueByLocale(cms, cmsLiveEditorBean.selectedSourceLanguage)}" />
      </p:column>
      <p:columns value="#{cmsLiveEditorBean.languageList}" var="lang">
        <f:facet name="header">
          <h:outputText value="#{lang.label}" />
        </f:facet>
        <h:outputText
          value="#{cmsLiveEditorBean.getValueByLocale(cms, lang.value)}" />
      </p:columns>
    </p:dataTable>
    <f:facet name="footer">
      <p:commandButton value="Cancel"
        onclick="PF('translationReviewDlg').hide(); return false;" />
      <p:commandButton value="Apply"
        action="#{cmsLiveEditorBean.applyTranslations}"
        oncomplete="PF('translationReviewDlg').hide();" />
    </f:facet>
  </p:dialog>
</ui:composition>
