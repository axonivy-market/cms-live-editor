<ui:composition xmlns="http://www.w3.org/1999/xhtml"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui">

  <p:dialog header="Translation wizard" closeOnEscape="false"
    widgetVar="translationReviewDialog" modal="true" closable="false"
    resizable="true" width="60rem" height="32rem"
    id="translationReviewDialog">

    <h:panelGroup id="reviewContent" layout="block">

      <p:dataTable value="#{cmsLiveEditorBean.selectedCmsEntries}"
        var="cms" styleClass="w-full p-datatable-sm review-data-table"
        stripedRows="true">
        <!-- Path -->
        <p:column headerText="Path" style="width: 18rem;">
          <h:outputText value="#{cms.uri}"
            style="word-break: break-all;" />
        </p:column>
        <!-- Source -->
        <p:column
          headerText="Source (#{cmsLiveEditorBean.selectedSourceLocale})"
          style="width: 18rem;">
          <h:outputText
            value="#{cmsLiveEditorBean.getSourceContent(cms)}"
            title="#{cmsLiveEditorBean.getSourceContent(cms)}" />
        </p:column>
        <!-- Target -->
        <p:column
          headerText="Target (#{cmsLiveEditorBean.selectedTargetLocale})"
          style="width: 20rem;">
          <!-- container as JSF panelGroup to keep Facelets happy -->
          <h:panelGroup layout="block">
            <!-- If the CMS is a file, show a friendly message -->
            <h:panelGroup rendered="#{cms.file}" layout="block"
              style="color: var(--text-color-secondary); font-style: italic; display:flex; align-items:center; gap:0.5rem;">
              <i class="pi pi-file" />
              <h:outputText
                value="This can't be translated since it's a file" />
            </h:panelGroup>

            <!-- Non-file: show old -> new translation preview -->
            <h:panelGroup rendered="#{not cms.file}" layout="block"
              style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
              <h:outputText
                value="#{cmsLiveEditorBean.getCmsContentByLocale(cms, cmsLiveEditorBean.selectedTargetLocale).content}"
                style="text-decoration: line-through; color: var(--text-color-secondary);"
                title="#{cmsLiveEditorBean.getCmsContentByLocale(cms, cmsLiveEditorBean.selectedTargetLocale).content}" />
              <h:outputText value="→"
                style="color: var(--text-color-secondary);" />
              <h:outputText
                value="#{cmsLiveEditorBean.getCmsContentByLocale(cms, cmsLiveEditorBean.selectedTargetLocale).translatedContent}"
                title="#{cmsLiveEditorBean.getCmsContentByLocale(cms, cmsLiveEditorBean.selectedTargetLocale).translatedContent}" />
            </h:panelGroup>
          </h:panelGroup>
        </p:column>

        <!-- Hide select column when CMS is a file -->
        <p:column headerText="Select"
          style="width: 5rem; text-align:center;"
          rendered="#{not cms.file}">
          <h:panelGroup layout="block"
            style="display:flex; justify-content:center;">
            <p:selectBooleanCheckbox
              value="#{cmsLiveEditorBean.getCmsContentByLocale(cms, cmsLiveEditorBean.selectedTargetLocale).translated}"
              disabled="#{empty cmsLiveEditorBean.getCmsContentByLocale(cms, cmsLiveEditorBean.selectedTargetLocale).translatedContent}">
              <p:ajax process="@this" update="@none" />
            </p:selectBooleanCheckbox>
          </h:panelGroup>
        </p:column>
      </p:dataTable>
    </h:panelGroup>
    <!-- Footer -->
    <f:facet name="footer">
      <div class="flex justify-content-end w-full">
        <div class="flex gap-2">
          <p:commandButton value="Cancel" styleClass="p-button-text"
            actionListener="#{cmsLiveEditorBean.cancelTranslations}"
            update=":content-form:reviewContent"
            oncomplete="PF('translationReviewDialog').hide();" />
          <p:commandButton value="Translate" icon="pi pi-check"
            styleClass="p-button-primary"
            action="#{cmsLiveEditorBean.applyTranslations}"
            process=":content-form:reviewContent"
            oncomplete="PF('translationReviewDialog').hide();" />
        </div>
      </div>
    </f:facet>
  </p:dialog>
</ui:composition>
